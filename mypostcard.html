<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first postcard</title>
    <link rel="stylesheet" href="mypostcard.css">
</head>
<body>
    <div class="card_container">
        <div class="title_container">
            <h1>Tarjeta de cumpleaños</h1>
            <img src="img/tarta_cumple.png" alt="Tarta de cumpleaños" class="img_tarta">
        </div>
        <div class="content_container">
            <div>
                <p>
                Si estás leyendo esto, es porque...
                <br/>
                <h2>¡Estás invitado a mi cumpleaños!</h2>
                <br/>
                Será el próximo sábado a las 19:00 en mi casa.
                </p>
            </div>
            <div>
                <form action="">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name">
                    <br/>
                    <label for="lastname">Apellido:</label>
                    <input type="text" id="lastname" name="lastname">
                    <br/>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </form>
            </div>
        </div>
        <div class="footer_container">
            <h2>¡Espero que puedas venir!</h2>
            <button class="send_button">Enviar carta</button>
        </div>
    </div>
</body>
</html>
